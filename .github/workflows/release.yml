name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: linux x86_64 (cpu + cuda)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.16
        with:
          cuda: '12.5.0'
          method: 'network'
          sub-packages: '["nvcc","cudart","cublas","cublas-dev"]'

      - name: Build CPU
        run: make cpu

      - name: Build CUDA
        run: make -C cuda NVCCFLAGS='-O3 -std=c++17 -Xcompiler "-Wall -Wextra" -arch=sm_80'

      - name: Stage artifacts
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          STAGE="qw36-${TAG}-linux-x86_64"
          mkdir -p "$STAGE"
          cp qw36_cpu qw36_cuda "$STAGE/"
          cp -r common "$STAGE/"
          cp -r metal "$STAGE/"
          cp README.md LICENSE CHANGELOG.md "$STAGE/" 2>/dev/null || true
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            qw36-*-linux-x86_64.tar.gz
            qw36-*-linux-x86_64.tar.gz.sha256

  macos-arm64:
    name: macos arm64 (cpu + metal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Metal SDK
        run: xcrun -sdk macosx metal --version

      - name: Build CPU
        run: make cpu

      - name: Build Metal
        run: make metal

      - name: Stage artifacts
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          STAGE="qw36-${TAG}-macos-arm64"
          mkdir -p "$STAGE"
          cp qw36_cpu qw36_metal "$STAGE/"
          cp metal/default.metallib "$STAGE/"
          cp -r common "$STAGE/"
          cp README.md LICENSE CHANGELOG.md "$STAGE/" 2>/dev/null || true
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            qw36-*-macos-arm64.tar.gz
            qw36-*-macos-arm64.tar.gz.sha256
